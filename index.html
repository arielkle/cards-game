<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קלפים לכיתה</title>
    
    <!-- טעינת העיצוב (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- טעינת React ישירות לדפדפן -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- טעינת Babel שמאפשר לקרוא את קוד ה-React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* אנימציות מיוחדות למשחק */
        @keyframes shimmer {
            100% { transform: translateX(400%); }
        }
        .animate-shimmer {
            animation: shimmer 1.5s infinite;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans m-0 p-0">
    <!-- כאן המשחק יטען -->
    <div id="root"></div>

    <!-- קוד המשחק (React) -->
    <script type="text/babel">
        const { useState } = React;

        // אייקונים לשימוש במשחק
        const SparklesIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-amber-500"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
        );
        const RefreshIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const LayersIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mb-6 opacity-50"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>
        );

        // יצירת חפיסת הקלפים הראשונית
        const generateInitialDeck = () => {
            return Array.from({ length: 40 }, (_, i) => ({
                id: i + 1,
                // כשהתיקייה מועלית לענן (Netlify), הקוד ימשוך את התמונות מנתיב הענן בצורה אוטומטית
                image: 'cards/card' + (i + 1) + '.jpg', 
            }));
        };

        function App() {
            const [deck, setDeck] = useState(generateInitialDeck());
            const [currentCard, setCurrentCard] = useState(null);
            const [isAnimating, setIsAnimating] = useState(false);
            const [failedImages, setFailedImages] = useState(new Set());

            const drawCard = () => {
                if (deck.length === 0) return;
                setIsAnimating(true);
                
                setTimeout(() => {
                    const randomIndex = Math.floor(Math.random() * deck.length);
                    const drawnCard = deck[randomIndex];
                    setCurrentCard(drawnCard);
                    
                    const newDeck = [...deck];
                    newDeck.splice(randomIndex, 1);
                    setDeck(newDeck);
                    
                    setIsAnimating(false);
                }, 400);
            };

            const resetGame = () => {
                if (window.confirm('האם את/ה בטוח/ה שברצונך להתחיל משחק חדש?')) {
                    setDeck(generateInitialDeck());
                    setCurrentCard(null);
                    setFailedImages(new Set());
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    
                    {/* אזור הכותרת */}
                    <div className="w-full max-w-4xl flex flex-col sm:flex-row justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div className="text-center sm:text-right mb-4 sm:mb-0">
                            <h1 className="text-3xl font-bold text-slate-800 mb-2 flex items-center justify-center sm:justify-start gap-2">
                                <SparklesIcon />
                                קלף בהפתעה
                            </h1>
                            <p className="text-slate-500">הגרילו קלף ובקשו מהתלמידים להגיב!</p>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            <div className="flex flex-col items-center bg-blue-50 px-4 py-2 rounded-xl text-blue-800">
                                <span className="text-sm font-medium">קלפים בקופה</span>
                                <span className="text-3xl font-bold">{deck.length}</span>
                            </div>
                            
                            <button onClick={resetGame} className="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition-colors p-2 rounded-lg hover:bg-slate-100" title="התחל מחדש">
                                <RefreshIcon />
                            </button>
                        </div>
                    </div>

                    {/* אזור הקלף במרכז המסך */}
                    <div className="flex-1 w-full max-w-2xl flex flex-col items-center justify-center relative">
                        <div className={`transition-all duration-500 transform ${isAnimating ? 'scale-95 opacity-50 blur-sm' : 'scale-100 opacity-100 blur-0'} w-full aspect-[3/4] max-w-md`}>
                            {currentCard ? (
                                <div className="w-full h-full relative group perspective-1000">
                                    <div className="w-full h-full rounded-3xl shadow-2xl border-8 border-white overflow-hidden bg-white transition-transform duration-300 group-hover:scale-[1.02]">
                                        
                                        {/* תצוגת הקלף או תצוגת ברירת מחדל במקרה שחסרה תמונה */}
                                        {currentCard.image && !failedImages.has(currentCard.id) ? (
                                            <img 
                                                src={currentCard.image} 
                                                alt={`קלף ${currentCard.id}`} 
                                                className="w-full h-full object-cover"
                                                onError={() => setFailedImages(prev => new Set(prev).add(currentCard.id))}
                                            />
                                        ) : (
                                            <div className="w-full h-full bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex flex-col items-center justify-center text-white">
                                                <span className="text-2xl font-medium mb-4 opacity-80">קלף מספר</span>
                                                <span className="text-9xl font-black drop-shadow-lg">{currentCard.id}</span>
                                            </div>
                                        )}

                                    </div>
                                </div>
                            ) : (
                                // מצב התחלתי לפני הגרלה
                                <div className="w-full h-full rounded-3xl shadow-xl border-4 border-dashed border-slate-300 flex flex-col items-center justify-center bg-slate-100/50 text-slate-400">
                                    <LayersIcon />
                                    <h2 className="text-2xl font-medium">הקופה מוכנה</h2>
                                    <p className="mt-2 text-center px-6">לחצו על הכפתור למטה כדי להגריל את הקלף הראשון</p>
                                </div>
                            )}
                        </div>

                        {/* כפתור הגרלת קלף */}
                        <div className="mt-12 mb-8">
                            <button
                                onClick={drawCard}
                                disabled={deck.length === 0 || isAnimating}
                                className={`relative overflow-hidden group px-10 py-5 rounded-full text-2xl font-bold text-white shadow-xl transition-all duration-300 ${deck.length === 0 ? 'bg-slate-300 cursor-not-allowed shadow-none' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 hover:shadow-2xl hover:-translate-y-1 active:translate-y-0'}`}
                            >
                                <div className="absolute inset-0 w-1/4 h-full bg-white/20 skew-x-12 -translate-x-full group-hover:animate-shimmer"></div>
                                <span className="relative flex items-center gap-3">
                                    {deck.length === 0 ? 'לא נותרו קלפים' : currentCard ? 'הגרילו קלף נוסף' : 'הגרילו קלף'}
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // הפעלת האפליקציה בתוך קובץ ה-HTML
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
